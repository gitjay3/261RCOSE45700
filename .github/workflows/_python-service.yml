name: python-service (reusable)

# 단일 파이썬 서비스(crawler / detection)의 lint + unit test 실행기.
# crawler.yml / detection.yml이 thin wrapper로 이 워크플로를 호출한다.
#
# 두 서비스의 lint-test 단계가 service 이름 빼곤 100% 동일했어서 추출.

on:
  workflow_call:
    inputs:
      service:
        description: '서비스 디렉토리 이름 (crawler 또는 detection)'
        required: true
        type: string

jobs:
  lint-test:
    name: lint-test
    runs-on: ubuntu-latest
    env:
      SERVICE_NAME: ${{ inputs.service }}
    defaults:
      run:
        working-directory: ${{ inputs.service }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ${{ inputs.service }}/requirements.txt

      - name: Upgrade pip + setuptools
        run: python -m pip install --upgrade pip setuptools

      - name: Install dependencies (-e ../shared via requirements.txt)
        run: pip install -r requirements.txt

      - name: Install lint + test tools
        run: pip install flake8 pytest

      - name: flake8
        run: flake8 src tests --max-line-length=120

      - name: pytest
        shell: bash
        run: |
          set +e
          python -m pytest tests/unit -v
          code=$?
          set -e
          # exit 5 = pytest "no tests collected" — placeholder 단계에서는 pass 처리.
          # 실제 테스트가 추가되면 자연스럽게 일반 exit code(0/1)로 평가됨.
          if [ "$code" -eq 5 ]; then
            echo "::notice::No tests collected — placeholder OK (Story 1.5)"
            exit 0
          fi
          exit "$code"
