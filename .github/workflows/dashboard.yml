name: dashboard

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - '.github/workflows/dashboard.yml'
  pull_request:
    paths:
      - 'dashboard/**'
      - '.github/workflows/dashboard.yml'

jobs:
  lint-test:
    name: lint-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 20.19
        uses: actions/setup-node@v6
        with:
          node-version: '20.19'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      # `npm run build`은 `tsc -b && vite build` 조합이라 typecheck + 번들이 한 번에.
      # vitest 미도입 상태라 별도 `npm test`는 Story 5.2/Growth로 deferred (Story 1.5 Dev Notes).
      - name: Build (typecheck + bundle)
        run: npm run build
