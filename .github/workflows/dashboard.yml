name: dashboard

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - '.github/workflows/dashboard.yml'
  pull_request:
    paths:
      - 'dashboard/**'
      - '.github/workflows/dashboard.yml'
  # Reusable entry — called by ci.yml (PR strict gate) and deploy.yml (main push gate).
  workflow_call:

jobs:
  lint-test:
    name: lint-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v6

      # pnpm/action-setup: dashboard/package.json#packageManager 자동 감지를 지원하지만
      # 액션은 repo 루트 기준으로 package.json을 찾는다(우리 package.json은 dashboard/
      # 안에 있어 감지 실패 → ERR_NO_PNPM_VERSION). version 명시로 회피.
      # setup-node의 cache: 'pnpm'이 동작하려면 pnpm이 PATH에 있어야 하므로 먼저 실행.
      # v6: Node 24 runtime — GitHub Actions Node 20 deprecation(2026-06) 대응.
      - uses: pnpm/action-setup@v6
        with:
          version: 11.1.1

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          # Node 22 LTS — @eslint-react/* (require >=22) EBADENGINE 경고 해소.
          # Dockerfile builder도 node:22-alpine으로 통일.
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: dashboard/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      # `pnpm build`은 `tsc -b && vite build` 조합이라 typecheck + 번들이 한 번에.
      # vitest 미도입 상태라 별도 `pnpm test`는 Story 5.2/Growth로 deferred (Story 1.5 Dev Notes).
      - name: Build (typecheck + bundle)
        run: pnpm build
