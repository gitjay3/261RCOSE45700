name: deploy

# Story 5.2 — main 머지 시 GHCR push → SSH 직결 배포 + healthcheck + 자동 롤백.
# OIDC / IAM Role / CodeDeploy 모두 봉인된 학생 계정 제약 하에서의 PIVOT 사양.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      rollback_to:
        description: "롤백 대상 git SHA (비우면 최신 main 배포)"
        required: false
        default: ""

# 배포 워크플로는 직렬 처리 — state 일관성 보호. CI(`ci.yml`)와 의도적으로 다름.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # 1) lint-test gate — branch protection 우회(workflow_dispatch 등) 시에도 안전.
  # ---------------------------------------------------------------------------
  lint-test-crawler:
    uses: ./.github/workflows/crawler.yml

  lint-test-detection:
    uses: ./.github/workflows/detection.yml

  lint-test-api:
    uses: ./.github/workflows/api.yml

  lint-test-dashboard:
    uses: ./.github/workflows/dashboard.yml

  # ---------------------------------------------------------------------------
  # 2) BuildKit multi-stage + GHCR registry cache mode=max.
  #    rollback_to 입력 시에는 build-push 생략 — 기존 :sha 이미지를 그대로 사용.
  # ---------------------------------------------------------------------------
  build-push:
    name: build-push (${{ matrix.service }})
    runs-on: ubuntu-latest
    if: ${{ inputs.rollback_to == '' }}
    needs:
      - lint-test-crawler
      - lint-test-detection
      - lint-test-api
      - lint-test-dashboard
    strategy:
      # 한 서비스 빌드 실패 시 다른 서비스의 진행 중인 :latest push가 중단되어
      # GHCR :latest 태그가 서비스별로 어긋나는 사고를 막는다.
      fail-fast: false
      matrix:
        service: [crawler, detection, api, dashboard]
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      registry_path: ${{ steps.meta.outputs.registry_path }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute image metadata
        id: meta
        run: |
          set -euo pipefail
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          REPO="$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
          REG_PATH="ghcr.io/${OWNER}/${REPO}"
          TAG="${{ github.sha }}"
          echo "registry_path=${REG_PATH}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        # v4: Node 24 runtime — GitHub Actions Node 20 deprecation(2026-06) 대응.
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        # v4: Node 24 runtime.
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.service }})
        # v7: Node 24 runtime + ESM. DOCKER_BUILD_NO_SUMMARY 등 deprecated env 제거.
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          # main push 시 :sha + :latest 동시 태깅. workflow_dispatch도 동일.
          tags: |
            ${{ steps.meta.outputs.registry_path }}/${{ matrix.service }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.registry_path }}/${{ matrix.service }}:latest
          # mode=max — 멀티스테이지 모든 레이어 캐싱 (inline cache는 min만 가능 → 미사용).
          cache-from: type=registry,ref=${{ steps.meta.outputs.registry_path }}/${{ matrix.service }}:cache
          cache-to: type=registry,ref=${{ steps.meta.outputs.registry_path }}/${{ matrix.service }}:cache,mode=max
          provenance: false

  # ---------------------------------------------------------------------------
  # 3) SSH .pem GH Secret 직결 배포 + healthcheck + 자동 롤백 (단일 호스트).
  #
  # 2026-05-07 3차 PIVOT: 학생 IAM SCP가 cross-SG ingress(redis 6379 source =
  # crawler-sg)를 차단해 2대 분리 불가 → 단일 EC2 합반으로 회귀. redis 트래픽이
  # docker network 내부에 머물러 SG 룰 불필요. mem_limit는 hard cap이 아니라
  # 가벼운 격리 hint (16GB 환경).
  # ---------------------------------------------------------------------------
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # 학생 collaborator 권한이 GH Environment 만들기 차단 → Repository secrets로 우회.
    # environment 보호 게이트(required reviewers 등) 잃지만 학생 프로젝트 규모에서 수용.
    needs: [build-push]
    # rollback_to 입력 시 build-push가 skip되므로, success || skipped 둘 다 허용.
    if: ${{ !cancelled() && (needs.build-push.result == 'success' || needs.build-push.result == 'skipped') }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve target tag
        id: target
        env:
          ROLLBACK: ${{ inputs.rollback_to }}
        run: |
          set -euo pipefail
          if [ -n "${ROLLBACK:-}" ]; then
            # SHA 형식 검증 — workflow_dispatch가 collaborator에게 열려 있어
            # 임의 문자열이 IMAGE_TAG로 흘러 들어가는 경로를 차단한다.
            case "$ROLLBACK" in
              ''|*[!a-fA-F0-9]*)
                echo "::error::Invalid rollback_to '$ROLLBACK' — must be hex SHA"
                exit 1
                ;;
            esac
            LEN=${#ROLLBACK}
            if [ "$LEN" -lt 7 ] || [ "$LEN" -gt 40 ]; then
              echo "::error::Invalid rollback_to length ($LEN) — expected 7..40"
              exit 1
            fi
            echo "image_tag=${ROLLBACK}" >> "$GITHUB_OUTPUT"
            echo "::notice::Rollback mode — deploying tag ${ROLLBACK}"
          else
            echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          REPO="$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
          echo "registry_path=ghcr.io/${OWNER}/${REPO}" >> "$GITHUB_OUTPUT"

      - name: Upload compose.prod.yml to EC2
        # SHA-pinned for supply-chain integrity (action receives EC2 .pem).
        # fingerprint 검증 생략 — 학생 프로젝트 trade-off: MITM 방어/EC2 host key 변경
        # 감지를 포기하는 대신 운영 단순화. EC2 교체 시점에 EC2_HOST secret 갱신만으로
        # 동작하도록 의도. (deferred-work에 host fingerprint sanity check 항목 닫음)
        #
        # appleboy/scp-action 의 `target` 은 항상 디렉터리로 해석됨 (공식 README).
        # `target: /opt/app/compose.prod.yml` 로 두면 그 경로를 디렉터리로 만들고
        # source 파일을 그 안에 저장 → `docker compose -f /opt/app/compose.prod.yml`
        # 가 "is a directory" 로 실패. `target: /opt/app/` + `strip_components: 1`
        # 로 infra/ prefix 벗기고 단일 파일로 저장.
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345  # v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "infra/compose.prod.yml"
          target: "/opt/app/"
          strip_components: 1
          overwrite: true

      - name: Deploy + healthcheck + auto-rollback
        # SHA-pinned for supply-chain integrity (action receives EC2 .pem + GHCR token).
        # fingerprint 검증 생략 — 위 step과 동일한 trade-off.
        # v1.2.5: Node 24 호환 + script_stop 입력 자체 제거 (어차피 script가
        # `set -euo pipefail` 시작이라 동일 효과).
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1.2.5
        env:
          IMAGE_TAG: ${{ steps.target.outputs.image_tag }}
          REGISTRY_PATH: ${{ steps.target.outputs.registry_path }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_TAG,REGISTRY_PATH,GHCR_USER,GHCR_TOKEN
          script: |
            set -euo pipefail

            DOCKER="$(command -v docker)" || { echo "::error::docker not found in PATH"; exit 1; }
            DCOMPOSE="$DOCKER compose"
            DATE="$(command -v date)"
            SLEEP="$(command -v sleep)"
            CAT="$(command -v cat)"
            ECHO="$(command -v echo)"

            redis_cmd() {
              "$DOCKER" exec tracker-redis \
                sh -c 'redis-cli --no-auth-warning -a "$(cat /run/secrets/redis_password)" "$@"' \
                sh "$@" 2>/dev/null
            }

            # GHCR 자격증명이 ~/.docker/config.json에 영속되지 않도록 종료 시 logout.
            # 배포 quiet 키도 성공/실패/롤백 모든 경로에서 정리한다.
            cleanup() {
              redis_cmd DEL crawler:quiet >/dev/null 2>&1 || true
              "$DOCKER" logout ghcr.io >/dev/null 2>&1 || true
            }
            trap cleanup EXIT

            # 두 번째 방어선 — input 검증을 한 번 더 (GHA env가 검증을 우회한 경로 대비).
            case "$IMAGE_TAG" in
              ''|*[!a-fA-F0-9]*)
                $ECHO "::error::Invalid IMAGE_TAG (non-hex)"
                exit 1
                ;;
            esac
            TAG_LEN=${#IMAGE_TAG}
            if [ "$TAG_LEN" -lt 7 ] || [ "$TAG_LEN" -gt 40 ]; then
              $ECHO "::error::IMAGE_TAG length ($TAG_LEN) out of bounds"
              exit 1
            fi

            cd /opt/app

            # 누락 시 컨테이너가 placeholder default(OpenAI key / Redis localhost)로
            # startup → healthcheck fail → 자동 롤백. 비싼 pull/up 전에 차단.
            REQUIRED_FILES=(
              /opt/app/.env
              /opt/app/secrets/openai_api_key
              /opt/app/secrets/db_password
              /opt/app/compose.prod.yml
            )
            for f in "${REQUIRED_FILES[@]}"; do
              if [ ! -s "$f" ]; then
                $ECHO "::error::Required file missing or empty: $f"
                exit 6
              fi
            done

            # IMAGE_TAG 비면 compose가 :latest로 fallback해 의도와 다른 이미지 배포됨.
            if [ -z "${IMAGE_TAG:-}" ] || [ -z "${REGISTRY_PATH:-}" ]; then
              $ECHO "::error::IMAGE_TAG or REGISTRY_PATH empty at deploy time"
              exit 7
            fi

            # GHCR login — 명시적으로 fatal. 캐시된 자격증명에 의존하지 않는다.
            if ! printf '%s' "$GHCR_TOKEN" | "$DOCKER" login ghcr.io -u "$GHCR_USER" --password-stdin; then
              $ECHO "::error::GHCR login failed"
              exit 2
            fi
            # 토큰을 셸 env에서 즉시 제거 — /proc/<pid>/environ 노출 창 단축.
            unset GHCR_TOKEN

            PREV_TAG="$($CAT /opt/app/IMAGE_TAG 2>/dev/null || true)"
            $ECHO "previous_tag=${PREV_TAG:-<none>}"
            $ECHO "new_tag=${IMAGE_TAG}"

            export IMAGE_TAG REGISTRY_PATH

            # 배포 중 새 크롤 사이클이 시작되지 않도록 quiet gate를 먼저 세팅한다.
            # 진행 중인 사이클은 아래 crawler:running drain 루프에서 완료를 기다린다.
            if redis_cmd SET crawler:quiet "deploy:${IMAGE_TAG}" EX 3600 >/dev/null; then
              $ECHO "crawler quiet enabled — 새 크롤 시작을 잠시 보류합니다."
            else
              $ECHO "::warning::crawler quiet 설정 실패 — running drain만 확인하고 배포를 진행합니다."
            fi

            # pull 전 오래된 이미지 정리 — 디스크 부족으로 pull 실패하는 경우 방지.
            "$DOCKER" image prune -a -f --filter "until=48h" || true

            # 일시적 GHCR 5xx/rate-limit 대비 3-회 재시도.
            PULL_OK=0
            for i in 1 2 3; do
              if $DCOMPOSE -f /opt/app/compose.prod.yml pull; then
                PULL_OK=1
                break
              fi
              $ECHO "::warning::compose pull attempt $i failed, retrying in 5s..."
              $SLEEP 5
            done
            if [ "$PULL_OK" != "1" ]; then
              $ECHO "::error::compose pull failed after 3 attempts"
              exit 3
            fi

            # 크롤링 도중 배포 시 컨테이너 교체로 크롤이 mid-stream에서 죽는 것을 방지.
            # crawler:running key(TTL 3600s)가 있으면 현재 크롤 사이클이 진행 중.
            # tracker-redis 컨테이너의 redis-cli로 확인 (redis password는 /run/secrets/ 마운트).
            # 최대 30분 대기 후 타임아웃 — 이후엔 강제 교체 (다음 시작 시 orphan cleanup).
            DRAIN_STARTED_AT=$($DATE +%s)
            DRAIN_DEADLINE=$(( $($DATE +%s) + 1800 ))
            DRAIN_NOTIFIED=0
            DRAIN_LAST_LOG_AT=0
            DRAIN_TIMED_OUT=1
            while [ $($DATE +%s) -lt $DRAIN_DEADLINE ]; do
              NOW=$($DATE +%s)
              IS_RUNNING=$(redis_cmd GET crawler:running || true)
              if [ -z "$IS_RUNNING" ] || [ "$IS_RUNNING" = "" ]; then
                if [ "$DRAIN_NOTIFIED" = "1" ]; then
                  ELAPSED=$(( NOW - DRAIN_STARTED_AT ))
                  $ECHO "크롤 완료 감지 — ${ELAPSED}s 대기 후 배포 진행"
                else
                  $ECHO "crawler idle — 배포 진행"
                fi
                DRAIN_TIMED_OUT=0
                break
              fi
              if [ "$DRAIN_NOTIFIED" = "0" ]; then
                $ECHO "크롤링 진행 중 — 최대 30분까지 배포를 대기합니다."
                DRAIN_NOTIFIED=1
                DRAIN_LAST_LOG_AT=$NOW
              elif [ $(( NOW - DRAIN_LAST_LOG_AT )) -ge 60 ]; then
                ELAPSED=$(( NOW - DRAIN_STARTED_AT ))
                REMAINING=$(( DRAIN_DEADLINE - NOW ))
                $ECHO "크롤 완료 대기 중 — 경과 ${ELAPSED}s, 최대 ${REMAINING}s 남음"
                DRAIN_LAST_LOG_AT=$NOW
              fi
              $SLEEP 10
            done
            if [ "$DRAIN_TIMED_OUT" = "1" ]; then
              $ECHO "::warning::크롤 완료 대기 30분 초과 — 배포를 계속 진행합니다."
            fi

            $DCOMPOSE -f /opt/app/compose.prod.yml up -d --remove-orphans

            # crawler start_period=90s + 콜드 부팅 여유를 고려해 deadline 180s.
            DEADLINE=$(( $($DATE +%s) + 180 ))
            ALL_OK=0
            while [ $($DATE +%s) -lt $DEADLINE ]; do
              $SLEEP 3
              ALL_OK=1
              for SVC in redis tor crawler detection api dashboard caddy; do
                CID=$($DCOMPOSE -f /opt/app/compose.prod.yml ps -q "$SVC" || true)
                if [ -z "$CID" ]; then ALL_OK=0; break; fi
                STATUS=$("$DOCKER" inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$CID" 2>/dev/null || $ECHO unknown)
                $ECHO "  ${SVC}: ${STATUS}"
                if [ "$STATUS" != "healthy" ]; then ALL_OK=0; fi
              done
              if [ "$ALL_OK" = "1" ]; then break; fi
            done

            if [ "$ALL_OK" = "1" ]; then
              # actuator readiness는 ping만 — DB+Redis+JPA 풀스택은 /api/stats가 처음 친다.
              if ! curl -fsS -m 5 http://127.0.0.1:8080/api/stats >/dev/null; then
                $ECHO "::error::Smoke test failed — /api/stats not 200 within 5s after all healthy"
                ALL_OK=0
              fi
            fi

            if [ "$ALL_OK" = "1" ]; then
              # IMAGE_TAG 마커는 "달라졌을 때만" 갱신 — 같은 SHA 재배포가
              # last-known-good을 erase하는 사고를 막는다. 별도 audit log는
              # 항상 append.
              if [ "$IMAGE_TAG" != "${PREV_TAG:-}" ]; then
                $ECHO "$IMAGE_TAG" > /opt/app/IMAGE_TAG
              fi
              $ECHO "$($DATE -u +%FT%TZ) deploy ${IMAGE_TAG}" >> /opt/app/IMAGE_TAG.log
              $ECHO "::notice::Deployed ${IMAGE_TAG} successfully."
              exit 0
            fi

            # ---- Rollback path ----
            FAILED_TAG="$IMAGE_TAG"

            if [ -z "${PREV_TAG:-}" ]; then
              $ECHO "::error::Healthcheck failed and no /opt/app/IMAGE_TAG marker exists — refusing to roll back to ':latest' (which is the same just-pushed broken image). Manual intervention required."
              exit 4
            fi
            if [ "$PREV_TAG" = "$FAILED_TAG" ]; then
              $ECHO "::error::Healthcheck failed and previous tag == current tag — refusing to redeploy the same broken image. Manual intervention required."
              exit 4
            fi

            $ECHO "::error::Healthcheck failed within 180s — rolling back ${FAILED_TAG} → ${PREV_TAG}"
            export IMAGE_TAG="$PREV_TAG"
            # NOTE: || true 없이 — 롤백 pull 실패는 무음으로 넘기지 않는다.
            $DCOMPOSE -f /opt/app/compose.prod.yml pull
            $DCOMPOSE -f /opt/app/compose.prod.yml up -d --remove-orphans

            # 롤백도 실제로 healthy해졌는지 다시 확인. "롤백 했다"가 아니라 "롤백 후 정상"을 검증.
            RB_DEADLINE=$(( $($DATE +%s) + 120 ))
            RB_OK=0
            while [ $($DATE +%s) -lt $RB_DEADLINE ]; do
              $SLEEP 3
              RB_OK=1
              for SVC in redis tor crawler detection api dashboard caddy; do
                CID=$($DCOMPOSE -f /opt/app/compose.prod.yml ps -q "$SVC" || true)
                if [ -z "$CID" ]; then RB_OK=0; break; fi
                STATUS=$("$DOCKER" inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$CID" 2>/dev/null || $ECHO unknown)
                if [ "$STATUS" != "healthy" ]; then RB_OK=0; fi
              done
              if [ "$RB_OK" = "1" ]; then break; fi
            done

            $ECHO "$($DATE -u +%FT%TZ) rollback ${FAILED_TAG}->${PREV_TAG} ok=${RB_OK}" >> /opt/app/IMAGE_TAG.log

            if [ "$RB_OK" = "1" ]; then
              $ECHO "::error::Rolled back to ${PREV_TAG}. Investigate failed deploy ${FAILED_TAG}."
              exit 1
            fi

            $ECHO "::error::Rollback to ${PREV_TAG} ALSO failed within 120s — manual intervention required. EC2 state undefined."
            exit 5
