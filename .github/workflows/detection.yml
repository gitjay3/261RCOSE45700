name: detection

on:
  push:
    branches: [main]
    paths:
      - 'detection/**'
      - 'shared/**'
      - '.github/workflows/detection.yml'
      - '.github/workflows/_python-service.yml'
  pull_request:
    paths:
      - 'detection/**'
      - 'shared/**'
      - '.github/workflows/detection.yml'
      - '.github/workflows/_python-service.yml'
  # Reusable entry — called by ci.yml (PR strict gate) and deploy.yml (main push gate).
  workflow_call:

jobs:
  lint-test:
    # crawler.yml과 100% 동일하던 lint-test 스텝을 _python-service.yml로 추출.
    uses: ./.github/workflows/_python-service.yml
    with:
      service: detection
