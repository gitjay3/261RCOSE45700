spring.application.name=tracker-api

# DataSource — infra/.env.example 환경변수 참조
# DB_SSL_MODE: 코드 default는 `require` (secure-by-default — 운영 RDS `rds.force_ssl=1` 기본 가정).
# 로컬 docker-compose Postgres는 SSL 미설정이므로 로컬 .env에서 `DB_SSL_MODE=disable` 명시 override.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_HOST_PORT:5432}/${DB_NAME:tracker}?sslmode=${DB_SSL_MODE:require}
spring.datasource.username=${DB_USER:tracker_user}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# Springdoc OpenAPI (Swagger UI)
# 운영 환경에서는 SWAGGER_ENABLED=true 로 명시해야 활성화됨 (보안: API 스펙 기본 비공개).
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Redis — crawl:trigger 채널 발행 (REDIS_MQ_DB=0)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.database=0

# Redis DB3 — API 통계 캐시 (REDIS_CACHE_DB=3)
spring.data.redis.cache.database=${REDIS_CACHE_DB:3}

# Actuator — Docker healthcheck가 /actuator/health/readiness를 사용하도록 probe 활성화.
# 기본 /actuator/health는 ping indicator만 집계하므로 DB DOWN이어도 UP을 반환 →
# readiness probe(DataSource 포함)로 honest signal 확보.
management.endpoint.health.probes.enabled=true
# Spring Security 미적용 환경에서 when-authorized = 사실상 never.
# DB/Redis 연결 상세를 외부에 노출하지 않음. healthcheck는 HTTP 상태코드(200/503)만 사용.
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true

# Actuator — Prometheus 메트릭 노출
management.endpoints.web.exposure.include=prometheus,health,info
management.endpoint.prometheus.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
