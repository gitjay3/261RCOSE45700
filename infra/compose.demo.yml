# Demo 배포 — frontend(MSW mock) + HTTPS reverse proxy(Caddy). 백엔드 컨테이너 없음.
#
# 사용 시점: VARCO API key 발급 전, RDS 연결 검증 전 — 화면 데모용 임시 구성.
# 운영 셋업 완료되면 compose.prod.yml로 회귀하고 이 파일은 보존만 (재사용 가능).
#
# 사전 요구사항:
#   1. /opt/app/                          (chmod 755, owner ubuntu)
#   2. /opt/app/Caddyfile                 (deploy-demo.yml에서 SCP)
#   3. EC2 보안그룹 inbound 80, 443 = 0.0.0.0/0
#   4. DNS A: tracker.o-r.kr → EC2 public IP
#
# 시크릿/env_file 모두 불필요 — dashboard는 빌드 시 정적으로 MSW 번들 포함.

x-image-defaults: &image-defaults
  pull_policy: always
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  dashboard:
    <<: *image-defaults
    image: ${REGISTRY_PATH}/dashboard:${IMAGE_TAG:?IMAGE_TAG required}
    container_name: tracker-dashboard
    networks:
      - tracker-net
    # ports 노출 없음 — caddy가 reverse proxy. dashboard:80은 docker network 내부만.
    mem_limit: 256m

  caddy:
    <<: *image-defaults
    image: caddy:2-alpine
    container_name: tracker-caddy
    ports:
      - "80:80"      # ACME HTTP-01 challenge + HTTP → HTTPS redirect
      - "443:443"    # 사용자 HTTPS 접속
    volumes:
      - /opt/app/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # Let's Encrypt 인증서 + ACME account key
      - caddy_config:/config
    networks:
      - tracker-net
    depends_on:
      - dashboard
    mem_limit: 128m

networks:
  tracker-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
