# Story 5.2 — 단일 EC2 (`tracker-prod`) docker compose.
#
# 2026-05-07 3차 PIVOT 결정 흐름:
#   1차) 단일 EC2 가정으로 작성
#   2차) t3.medium 4GB OOM 우려 → 2대 분리(crawler/app)로 보강
#   3차) 학생 IAM SCP가 cross-SG ingress(app-sg에 redis 6379 source = crawler-sg)
#        를 차단 → 2대 분리 불가 → 단일 EC2 회귀, 대신 t3.medium → **t3.xlarge
#        (16GB)** 상향으로 메모리 여유 확보 (월 ~$124, budget $215 안에서 OK).
#
# 컨테이너: redis + crawler + detection + api + dashboard (5개)
# 노출 포트: 22 (SSH) + 80 (dashboard) + 8080 (api). redis 6379는 호스트 노출 X
# (cross-SG ingress 차단 우회는 docker network 내부 통신으로 자연스럽게 해소).
#
# 사전 요구사항:
#   1. /opt/app/                          (chmod 755, owner ubuntu)
#   2. /opt/app/secrets/openai_api_key    (chmod 0444, root:root)
#   3. /opt/app/secrets/db_password       (chmod 0444, root:root)
#   4. /opt/app/secrets/redis_password    (chmod 0444, root:root) — CVE-2025-49844 대응
#   5. /opt/app/.env                      (chmod 600) — REDIS_HOST=redis (compose 내부)
#      REDIS_URL=redis://redis:6379 으로 설정. Python/Spring 모두 secret-shim이
#      주입하는 REDIS_PASSWORD를 사용해 인증한다.
#
# 16GB 환경이라 mem_limit는 hard cap이 아니라 가벼운 격리 hint 수준으로 둠 —
# 실제로 16GB의 21%(~3.3GB)도 안 쓰지만 한 컨테이너 폭주가 다른 컨테이너 굶기지
# 않도록 reserve. swap 셋업 불필요.
#
# AC #12: 시크릿은 secrets: 마운트 → secret-shim이 env로 변환.

x-image-defaults: &image-defaults
  pull_policy: always
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  redis:
    image: redis:7-alpine
    container_name: tracker-redis
    # CVE-2025-49844 (CVSS 10.0): requirepass 없으면 NOAUTH Lua RCE 가능.
    # 호스트 6379 미노출(docker network 내부)이라도 requirepass 필수 (컨테이너 탈출 시 대비).
    # 리스트 형식 필수 — 문자열 형식은 word-split으로 sh -c 구조가 깨짐.
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass $(cat /run/secrets/redis_password) --maxmemory 1gb --maxmemory-policy allkeys-lru"]
    secrets:
      - redis_password
    volumes:
      - redis_data:/data
    networks:
      - tracker-net
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a \"$(cat /run/secrets/redis_password)\" ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  crawler:
    <<: *image-defaults
    image: ${REGISTRY_PATH}/crawler:${IMAGE_TAG:-latest}
    container_name: tracker-crawler
    env_file: /opt/app/.env
    environment:
      SERVICE_NAME: crawler
    secrets:
      - redis_password
    networks:
      - tracker-net
    depends_on:
      redis:
        condition: service_healthy
    # Playwright Chromium이 메모리 hog. 16GB 환경이라 hard cap은 후하게 4GB.
    mem_limit: 4g
    mem_reservation: 1g

  detection:
    <<: *image-defaults
    image: ${REGISTRY_PATH}/detection:${IMAGE_TAG:-latest}
    container_name: tracker-detection
    env_file: /opt/app/.env
    environment:
      SERVICE_NAME: detection
    secrets:
      - openai_api_key
      - db_password
      - redis_password
    networks:
      - tracker-net
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: 1g
    mem_reservation: 256m

  api:
    <<: *image-defaults
    image: ${REGISTRY_PATH}/api:${IMAGE_TAG:-latest}
    container_name: tracker-api
    env_file: /opt/app/.env
    environment:
      SERVICE_NAME: api
      # 시크릿(DB_PASSWORD)은 /run/secrets/db_password 마운트 → secret-shim이
      # 컨테이너 안에서 DB_PASSWORD env로 export. application.properties는
      # ${DB_PASSWORD}를 직접 읽도록 구성되어 있다 (AC #12 — env 직접 주입 금지).
      # ⚠ compose `environment:`로 SPRING_DATASOURCE_PASSWORD를 주입하지 말 것:
      #    compose interpolation은 호스트 셸 env에서 평가되며, /opt/app/.env는
      #    의도적으로 DB_PASSWORD를 포함하지 않으므로 default 문자열로 떨어진다.
      # 16GB 환경 → JVM heap 1.5~2GB로 충분. G1GC 기본 사용.
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75"
    secrets:
      - db_password
      - redis_password
    ports:
      - "8080:8080"
    networks:
      - tracker-net
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: 2g
    mem_reservation: 768m

  dashboard:
    <<: *image-defaults
    image: ${REGISTRY_PATH}/dashboard:${IMAGE_TAG:-latest}
    container_name: tracker-dashboard
    # 호스트 publish 제거. caddy 가 80/443 잡고 docker network 안에서 dashboard:80 으로 reverse_proxy.
    expose:
      - "80"
    networks:
      - tracker-net
    # api healthy 후 dashboard 시작 — nginx /api proxy가 502 Bad Gateway를 받는
    # cold-start race 회피 (Dockerfile inline nginx.conf에 /api → http://api:8080
    # proxy_pass 정의됨). 첫 페이지 새로고침 시 frontend → /api/* 호출이 502 받지 않도록.
    depends_on:
      api:
        condition: service_healthy
    # nginx-alpine + Vite 번들 워커 burst 시 OOM-kill 방지를 위해 256m로 상향.
    mem_limit: 256m

  caddy:
    image: caddy:2-alpine
    container_name: tracker-caddy
    # ACME HTTP-01 챌린지(80) + 사용자 HTTPS 접속(443). Caddyfile 의 도메인은 tracker.o-r.kr.
    # cert 는 caddy_data 볼륨에 영속 — 컨테이너 재기동 시 재발급 없음 (Let's Encrypt rate limit 회피).
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/app/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - tracker-net
    depends_on:
      dashboard:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      # Caddyfile 의 site block (tracker.o-r.kr) 는 host header 매칭 필수.
      # localhost 로 wget 하면 match 안 돼 응답 없음 → unhealthy 오판.
      # 단순 TCP LISTEN 만 확인 (busybox nc). 80 살아있으면 caddy 도 살아있음.
      test: ["CMD", "nc", "-z", "localhost", "80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 128m

secrets:
  openai_api_key:
    file: /opt/app/secrets/openai_api_key
  db_password:
    file: /opt/app/secrets/db_password
  redis_password:
    file: /opt/app/secrets/redis_password

networks:
  tracker-net:
    driver: bridge

volumes:
  redis_data:
  caddy_data:
  caddy_config:
