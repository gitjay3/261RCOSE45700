name: tracker

# Redis DB role assignments (DB0~3 logical separation)
# Application services (crawler/detection/api) will use <<: *redis-db-config
x-redis-db-config: &redis-db-config
  REDIS_MQ_DB: ${REDIS_MQ_DB:-0}         # posts:queue / posts:processing / posts:dlq
  REDIS_DEDUP_DB: ${REDIS_DEDUP_DB:-1}   # posts:dedup (SHA-256 hash SET)
  REDIS_RATELIMIT_DB: ${REDIS_RATELIMIT_DB:-2}  # llm:rate_limit (token bucket)
  REDIS_CACHE_DB: ${REDIS_CACHE_DB:-3}   # cache:detections (API cache)

services:
  redis:
    image: redis:7-alpine
    container_name: tracker-redis
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: tracker-postgres
    ports:
      - "127.0.0.1:${DB_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-tracker}
      POSTGRES_USER: ${DB_USER:-tracker_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: tracker-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    container_name: tracker-grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  grafana_data:
